<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossary Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <header class="topbar no-print">
    <div>
      <h1>Glossary Atlas</h1>
      <p class="subtitle">Multi-course concept reference with glossary lookup, carousel sheets, and concept learning mode.</p>
    </div>
    <div class="top-actions">
      <button id="downloadPdf" class="btn primary" type="button">Export PDF</button>
    </div>
  </header>

  <main class="page" id="atlasPage">
    <section class="card controls-card no-print">
      <div class="controls-grid">
        <label class="control-block" for="courseSelect">
          <span class="control-label">Course</span>
          <select id="courseSelect"></select>
        </label>

        <label class="control-block control-block-wide" for="searchInput">
          <span class="control-label">Search</span>
          <input id="searchInput" type="search" placeholder="Search terms, definitions, analogies, reference sheets..." />
        </label>

        <div class="control-block glossary-only" id="glossaryColumnControl" aria-label="Column detail controls">
          <span class="control-label">More columns</span>
          <div class="column-toggles" id="columnToggleGroup">
            <label><input type="checkbox" data-column="notation" /> Notation / Symbols</label>
            <label><input type="checkbox" data-column="example" /> Example</label>
            <label><input type="checkbox" data-column="analogy" /> Analogy</label>
            <label><input type="checkbox" data-column="failureModes" /> Failure Modes</label>
            <label><input type="checkbox" data-column="visualization" /> Visualization</label>
          </div>
        </div>
      </div>
    </section>

    <section class="card intro-card">
      <div>
        <h2 id="courseTitle">Decision, Risk, and Reliability</h2>
        <p id="courseDescription" class="intro-text"></p>
      </div>

      <div class="tab-row no-print" role="tablist" aria-label="Atlas sections">
        <button class="tab-btn active" id="tabGlossary" data-tab="glossary" role="tab" aria-selected="true" type="button">Glossary</button>
        <button class="tab-btn" id="tabReference" data-tab="reference" role="tab" aria-selected="false" type="button">Reference Sheets</button>
        <button class="tab-btn" id="tabLearn" data-tab="learn" role="tab" aria-selected="false" type="button">Learn the Concepts</button>
      </div>

      <form id="feedbackForm" class="feedback-form no-print">
        <label class="control-block control-block-wide" for="feedbackInput">
          <span class="control-label">Feedback</span>
          <textarea id="feedbackInput" rows="4" placeholder="Enter feedback about the glossary layout, content, or usability."></textarea>
        </label>
        <div class="feedback-actions">
          <button id="sendFeedbackBtn" class="btn secondary" type="submit">Send Feedback</button>
          <span id="feedbackStatus" class="feedback-status" aria-live="polite"></span>
        </div>
      </form>
    </section>

    <section id="glossaryPanel" class="panel-stack">
      <section class="card results-card" id="searchResultsSection" hidden>
        <div class="section-head">
          <h3>Search Results</h3>
          <span id="resultCount" class="result-count"></span>
        </div>
        <div class="table-shell">
          <table class="atlas-table">
            <thead>
              <tr id="searchTableHeadRow"></tr>
            </thead>
            <tbody id="searchResultsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="accordion-list" id="subdomainAccordion"></section>
    </section>

    <section id="referencePanel" class="panel-stack" hidden>
      <section class="card reference-card">
        <div class="reference-toolbar no-print">
          <div class="reference-nav">
            <button id="referencePrevBtn" class="btn secondary" type="button">← Previous</button>
            <span id="referenceCounter" class="reference-counter"></span>
            <button id="referenceNextBtn" class="btn secondary" type="button">Next →</button>
          </div>
          <div class="reference-actions">
            <button id="downloadSheetBtn" class="btn secondary" type="button">Download Sheet</button>
            <button id="emailSheetBtn" class="btn secondary" type="button">Email Sheet</button>
          </div>
        </div>

        <div class="carousel-shell" id="carouselShell">
          <div class="reference-track" id="referenceTrack"></div>
        </div>
      </section>
    </section>

    <section id="learnPanel" class="panel-stack" hidden>
      <section class="card learn-card">
        <div class="section-head">
          <h3>Learn the Concepts</h3>
          <span id="learnCount" class="result-count"></span>
        </div>
        <div id="learnCards" class="learn-grid"></div>
      </section>
    </section>
  </main>
</body>
</html>
